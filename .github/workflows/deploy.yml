name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{ steps.build.outputs.tarball }}        # exposed to downstream jobs
    steps:
      - uses: actions/checkout@v7
      - id: build                                          # gives this step an addressable name
        run: ./scripts/build.sh                            # the script writes "tarball=..." to $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v6
        with:
          name: pipeline-bundle
          path: ./dist

  deploy-dev:
    needs: build
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: pipeline-bundle
      - uses: actions/checkout@v7
      - run: ./scripts/fake_deploy.sh dev

  deploy-test:
    needs: deploy-dev
    environment: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: pipeline-bundle
      - run: ./scripts/fake_deploy.sh test

  deploy-prod:
    needs: deploy-test
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: pipeline-bundle
      - run: ./scripts/fake_deploy.sh prod
